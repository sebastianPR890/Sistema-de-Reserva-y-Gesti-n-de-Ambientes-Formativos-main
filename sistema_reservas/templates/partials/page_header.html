<div class="page-header-std">
    {% if breadcrumb_url %}
    <nav class="breadcrumb-nav" aria-label="breadcrumb">
        <a href="{{ breadcrumb_url }}"><i class="fas fa-arrow-left me-1"></i> {{ breadcrumb_label|default:"Volver" }}</a>
    </nav>
    {% endif %}
    <div class="page-title-row">
        <div>
            <h2><i class="{{ page_icon }}"></i> {{ page_title }}</h2>
            {% if page_subtitle %}
            <p class="page-subtitle">{{ page_subtitle }}</p>
            {% endif %}
        </div>
        {% if action_url %}
        <a href="{{ action_url }}" class="btn-action">
            <i class="{{ action_icon|default:'fas fa-plus' }}"></i> {{ action_label }}
        </a>
        {% endif %}
    </div>
</div>
