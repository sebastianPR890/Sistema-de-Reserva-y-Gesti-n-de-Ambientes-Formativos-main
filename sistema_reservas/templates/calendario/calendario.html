{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid" style="background: linear-gradient(135deg, #1e7e34 0%, #155724 100%); min-height: 100vh; padding: 2rem;">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header bg-white border-bottom-0 py-4 rounded-top-4">
                    <h2 class="mb-0 fw-bold text-dark">
                        <i class="fas fa-calendar-alt me-2 text-success"></i>
                        Calendario de Todas las Reservas
                    </h2>
                </div>
                <div class="card-body p-4">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<!-- Locale español -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.es.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listMonth'
        },
        locale: 'es',
        events: function(info, successCallback, failureCallback) {
            // Convertir fechas al formato ISO correcto
            const startDate = new Date(info.start);
            const endDate = new Date(info.end);
            
            // Crear strings ISO sin timezone info local
            const startISO = startDate.toISOString();
            const endISO = endDate.toISOString();
            
            fetch(`{% url 'calendario:get_reservas' %}?start=${encodeURIComponent(startISO)}&end=${encodeURIComponent(endISO)}`)
                .then(r => r.json())
                .then(data => {
                    if (Array.isArray(data)) {
                        successCallback(data);
                    } else {
                        failureCallback(data.error || 'Error al cargar reservas');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    failureCallback('Error al cargar reservas');
                });
        },
        eventClick: function(info) {
            const evento = info.event;
            alert(
                `Ambiente: ${evento.title}\n` +
                `Usuario: ${evento.extendedProps.usuario}\n` +
                `Estado: ${evento.extendedProps.estado}\n` +
                `Propósito: ${evento.extendedProps.proposito}`
            );
        },
        eventClassNames: function(info) {
            const estado = info.event.extendedProps.estado;
            if (estado === 'Aprobada') {
                return ['bg-success'];
            } else if (estado === 'Pendiente') {
                return ['bg-warning'];
            } else if (estado === 'Cancelada') {
                return ['bg-danger'];
            }
            return [];
        },
        slotLabelFormat: {
            hour: 'numeric',
            minute: '2-digit',
            meridiem: 'short'
        }
    });
    calendar.render();
});
</script>

<style>
.fc {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.fc .fc-button-primary {
    background-color: #28a745 !important;
    border-color: #28a745 !important;
}

.fc .fc-button-primary:hover {
    background-color: #218838 !important;
}

.fc .fc-button-primary.fc-button-active {
    background-color: #1e7e34 !important;
    border-color: #1e7e34 !important;
}

.fc .fc-daygrid-day.fc-day-today {
    background-color: rgba(40, 167, 69, 0.1) !important;
}

.fc .fc-event {
    border: none !important;
    padding: 2px 4px;
}

.fc .fc-event-title {
    font-weight: 600;
    font-size: 0.8rem;
}

.fc .fc-col-header {
    background: rgba(40, 167, 69, 0.1);
}

.fc .fc-daygrid-day-number {
    padding: 8px 4px;
    font-weight: 600;
    color: #1e7e34;
}

.fc .fc-event.bg-success {
    background-color: #28a745 !important;
    color: white;
}

.fc .fc-event.bg-warning {
    background-color: #ffc107 !important;
    color: #333;
}

.fc .fc-event.bg-danger {
    background-color: #dc3545 !important;
    color: white;
}
</style>
{% endblock %}
