{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="page-container">
    <div class="row">
        <div class="col-12">
            <div class="card-std">
                <div class="card-header bg-white border-bottom-0 py-4">
                    <h2 class="mb-0 fw-bold text-dark">
                        <i class="fas fa-calendar-alt me-2 text-success"></i>
                        Calendario de Todas las Reservas
                    </h2>
                </div>
                <div class="card-body p-4">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<!-- Locale español -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.es.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listMonth'
        },
        locale: 'es',
        events: function(info, successCallback, failureCallback) {
            const startDate = new Date(info.start);
            const endDate = new Date(info.end);
            const startISO = startDate.toISOString();
            const endISO = endDate.toISOString();

            fetch(`{% url 'calendario:get_reservas' %}?start=${encodeURIComponent(startISO)}&end=${encodeURIComponent(endISO)}`)
                .then(r => r.json())
                .then(data => {
                    if (Array.isArray(data)) {
                        successCallback(data);
                    } else {
                        failureCallback(data.error || 'Error al cargar reservas');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    failureCallback('Error al cargar reservas');
                });
        },
        eventClick: function(info) {
            const ev = info.event;
            document.getElementById('modalCalTitulo').textContent   = ev.title;
            document.getElementById('modalCalUsuario').textContent  = ev.extendedProps.usuario || '-';
            document.getElementById('modalCalEstado').textContent   = ev.extendedProps.estado  || '-';
            document.getElementById('modalCalProposito').textContent = ev.extendedProps.proposito || '-';
            new bootstrap.Modal(document.getElementById('modalDetalleReserva')).show();
        },
        eventClassNames: function(info) {
            const estado = info.event.extendedProps.estado;
            if (estado === 'Aprobada') {
                return ['bg-success'];
            } else if (estado === 'Pendiente') {
                return ['bg-warning'];
            } else if (estado === 'Cancelada') {
                return ['bg-danger'];
            }
            return [];
        },
        slotLabelFormat: {
            hour: 'numeric',
            minute: '2-digit',
            meridiem: 'short'
        }
    });
    calendar.render();
});
</script>
<!-- Modal detalle de reserva -->
<div class="modal fade" id="modalDetalleReserva" tabindex="-1" aria-labelledby="modalDetalleReservaLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header card-header-green border-0">
                <h5 class="modal-title fw-bold" id="modalDetalleReservaLabel">
                    <i class="fas fa-calendar-check me-2"></i>Detalle de Reserva
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body p-4">
                <ul class="list-unstyled mb-0">
                    <li class="mb-3"><span class="text-muted small">Ambiente</span><div class="fw-bold" id="modalCalTitulo"></div></li>
                    <li class="mb-3"><span class="text-muted small">Usuario</span><div class="fw-bold" id="modalCalUsuario"></div></li>
                    <li class="mb-3"><span class="text-muted small">Estado</span><div class="fw-bold" id="modalCalEstado"></div></li>
                    <li><span class="text-muted small">Propósito</span><div class="fw-bold" id="modalCalProposito"></div></li>
                </ul>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-std btn-outline-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times me-1"></i>Cerrar
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
