{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="page-container">
    <div class="row">
        <div class="col-12">
            <div class="card-std">
                <div class="card-header bg-white border-bottom-0 py-4">
                    <h2 class="mb-0 fw-bold text-dark">
                        <i class="fas fa-calendar-alt me-2 text-success"></i>
                        Calendario de Todas las Reservas
                    </h2>
                </div>
                <div class="card-body p-4">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<!-- Locale español -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.es.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listMonth'
        },
        locale: 'es',
        events: function(info, successCallback, failureCallback) {
            const startDate = new Date(info.start);
            const endDate = new Date(info.end);
            const startISO = startDate.toISOString();
            const endISO = endDate.toISOString();

            fetch(`{% url 'calendario:get_reservas' %}?start=${encodeURIComponent(startISO)}&end=${encodeURIComponent(endISO)}`)
                .then(r => r.json())
                .then(data => {
                    if (Array.isArray(data)) {
                        successCallback(data);
                    } else {
                        failureCallback(data.error || 'Error al cargar reservas');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    failureCallback('Error al cargar reservas');
                });
        },
        eventClick: function(info) {
            const evento = info.event;
            alert(
                `Ambiente: ${evento.title}\n` +
                `Usuario: ${evento.extendedProps.usuario}\n` +
                `Estado: ${evento.extendedProps.estado}\n` +
                `Propósito: ${evento.extendedProps.proposito}`
            );
        },
        eventClassNames: function(info) {
            const estado = info.event.extendedProps.estado;
            if (estado === 'Aprobada') {
                return ['bg-success'];
            } else if (estado === 'Pendiente') {
                return ['bg-warning'];
            } else if (estado === 'Cancelada') {
                return ['bg-danger'];
            }
            return [];
        },
        slotLabelFormat: {
            hour: 'numeric',
            minute: '2-digit',
            meridiem: 'short'
        }
    });
    calendar.render();
});
</script>
{% endblock %}
